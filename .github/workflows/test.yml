name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify imports compile
        run: |
          python -m py_compile app.py
          python -c "import importlib; [importlib.import_module(m) for m in ['src.core.constants','src.core.helpers','src.data.ingest','src.domain.helpers','src.domain.aggregations','src.domain.pivot','src.domain.briefing','src.domain.budget','src.services.excel_export','src.ui.styles','src.ui.dataframe_stylers','src.features.overview','src.features.shared','src.features.trend','src.features.leaderboard','src.features.budget_review','src.features.movement']]"

      - name: Run pytest
        run: pytest --tb=short
